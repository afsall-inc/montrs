[package]
name = "montrs-validator"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lib]
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full", "derive"] }
quote = "1.0"
proc-macro2 = "1.0"
regex = "1.10"
# montrs-core is not a dependency here anymore because we use it in generated code via full path
# or we don't import it in the proc-macro crate itself to avoid unlinked crate issues during compilation.

[dev-dependencies]
montrs-core = { path = "../core" }
