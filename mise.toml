[tools]
rust = "1.84"

[env]
RUST_BACKTRACE = "1"
MONTRS_LOG = "info"

[tasks]
build = "cargo build --workspace"
test = "cargo test --workspace"
fmt = "cargo fmt --all"
clippy = "cargo clippy --workspace -- -D warnings"
bench = "cargo run --package montrs-cli -- bench"

[tasks.dev]
description = "Start the development server"
run = "cargo run --package montrs-cli -- serve"

[tasks.headers]
description = "Apply license headers to all source files"
run = "python3 scripts/apply_headers.py"

[tasks.ci]
description = "Run all CI checks"
depends = ["fmt", "headers", "clippy", "test"]
